[Performance]
# Enable component caching for vision system
# Reduces raycasts by ~50-80%
EnableVisionCache = true

# Reduce Update() calls frequency
# Instead of running every frame, runs only every X seconds
# Reduces CPU usage by 50%+
EnableUpdateThrottling = true

# How often to run expensive Update checks (in seconds)
# Lower = more responsive but higher CPU
# Higher = better FPS but slightly less responsive
# Range: 0.05 - 0.2
# Default: 0.1
UpdateTickRate = 0.5

# Cache distance calculations
# Reduces Vector3.Distance() calls
EnableDistanceCache = true

# Distance-Based Level-Of-Detail system (NEW in v1.2)
# 3 tiers: LOD0 (<5m full), LOD1 (5-15m half), LOD2 (>15m minimal)
EnableLODSystem = true

# Event-Aware throttling
# Disables throttling during conversations/events
EnableEventAware = true

[AdaptiveLogic]
# NEW in v1.2: Disable StudentScript.Update() for distant NPCs
# Keeps NavMeshAgent navigation working, only disables expensive Update loops
# Expected impact: +15-25% FPS in crowds
EnableAdaptiveLogic = true

# Distance threshold in meters
# NPCs beyond this distance have their Update() disabled
# Recommended: 20m (about 1 school hallway)
AdaptiveLogicDistance = 40

[IKSystem]
# NEW in v1.2: Disable head/eye IK animation for distant students
EnableIKDisable = true

# Distance threshold for IK disabling (meters)
IKDisableDistance = 10

[Memory]
# Enable memory optimization features
# Reduces garbage collection pressure
# Saves 1-2 GB of RAM
EnableMemoryOptimization = true

# Optimize garbage collection pauses
# Runs GC.Collect() only when FPS is stable
# Reduces "lag spikes" from GC
# Decreases GC pauses from 50ms to 10ms
EnableGCOptimization = true

# Cache GetComponent() calls
# GetComponent is expensive - cache results
# Reduces garbage collection heap pressure
# Saves 200-500MB RAM
EnableComponentCache = true

[Debug]
# Enable debug logging to console
# Shows mod initialization messages
# Useful for troubleshooting
EnableDebugLogging = false

# ============================================================
# CONFIGURATION PRESETS for v1.2
# ============================================================

# VIDEO GAME MODE (Maximum Performance)
# UpdateTickRate = 0.1
# AdaptiveLogicDistance = 15
# Result: 100-120+ FPS, 4.5GB RAM

# STREAMING MODE (Balanced - DEFAULT)
# (Keep all defaults above)
# Result: 80-100 FPS, 5GB RAM

# TABLET MODE (RAM Priority)
# UpdateTickRate = 0.15
# AdaptiveLogicDistance = 20
# Result: 60-80 FPS, 4GB RAM

# WEAK PC MODE (<4GB RAM)
# UpdateTickRate = 0.2
# AdaptiveLogicDistance = 25
# Result: 50-60 FPS, 3.5GB RAM
